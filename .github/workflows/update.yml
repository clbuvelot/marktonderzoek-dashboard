name: Update TenderNed Dataset

on:
  workflow_dispatch:        # handmatig triggeren via dashboard of GitHub UI
  schedule:
    - cron: '0 6 * * *'    # elke dag om 06:00 UTC

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # voor git push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Python instellen
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Dependencies installeren
        run: pip install -r requirements.txt

      - name: Pipeline uitvoeren
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update.py

      - name: Controleer op wijzigingen
        id: check
        run: |
          git diff --quiet data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit en push bijgewerkte data
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "data: incrementele update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Geen wijzigingen
        if: steps.check.outputs.changed == 'false'
        run: echo "Geen nieuwe publicaties gevonden, niets gecommit."
